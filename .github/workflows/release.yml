# Release workflow: tag (v*) を push すると Phone / Glass の debug APK を
# 自動でビルドして GitHub Release に添付する。
#
# 署名は GitHub SECRETS に登録した debug.keystore を使う (固定):
#   - リポジトリ Settings → Secrets and variables → Actions → New repository secret
#   - Name:  DEBUG_KEYSTORE_B64
#   - Value: `base64 -w 0 ~/.android/debug.keystore` の出力
# secret が未登録なら CI ランナー生成の ephemeral keystore でビルドが走るが、その
# 場合 build 毎に署名が変わるため上書き install できない (= 1 リリースの中だけ有効)。
#
# debug.keystore の credentials は Android SDK の固定 default:
#   storePassword=android, alias=androiddebugkey, keyPassword=android
# これらは Android Studio が generate するキーと同じ値なので secret 化しない。

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # release を作成・更新するために必要

jobs:
  build-and-release:
    name: Build APK + attach to GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore stable debug keystore (from secret if present)
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore
            echo "::notice::Using stable debug keystore from DEBUG_KEYSTORE_B64 secret"
          else
            echo "::warning::DEBUG_KEYSTORE_B64 secret is not set; Gradle will auto-generate an ephemeral keystore. APKs from different runs cannot be installed over each other."
          fi

      - name: Build Phone + Glass debug APKs
        run: ./gradlew :phone:assembleDebug :glass:assembleDebug --no-daemon

      - name: Rename APKs with tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv phone/build/outputs/apk/debug/phone-debug.apk "phone-${TAG}-debug.apk"
          mv glass/build/outputs/apk/debug/glass-debug.apk "glass-${TAG}-debug.apk"
          ls -la *.apk

      - name: Create / update GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phone-*-debug.apk
            glass-*-debug.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## ${{ github.ref_name }}

            Phone / Glass の **debug ビルド APK** を添付しています。

            ### インストール

            ```
            ADB=~/Android/Sdk/platform-tools/adb
            $ADB install -r phone-${{ github.ref_name }}-debug.apk
            $ADB install -r glass-${{ github.ref_name }}-debug.apk
            ```

            セットアップ全体は [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) を参照。

            ### 注意

            - **debug 署名**なので production 用途には Phase 6 (Hub TLS + release variant) を待ってください。
            - 別 PC から ビルドした debug APK を install したことがある場合、署名不一致で reject されます (`INSTALL_FAILED_UPDATE_INCOMPATIBLE`)。その場合は `$ADB uninstall <package>` してから再 install してください。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
