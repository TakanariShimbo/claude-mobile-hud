name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  protocol:
    name: ":protocol (Kotlin/JVM)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build :protocol
        run: ./gradlew :protocol:build :protocol:test --no-daemon

  hub:
    name: "hub (Node)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: hub/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  bridge:
    name: "bridge (Node)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  phone:
    name: "phone (Android)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :phone:lintDebug :phone:testDebugUnitTest --no-daemon

  glass:
    name: "glass (Android)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :glass:lintDebug :glass:testDebugUnitTest --no-daemon
